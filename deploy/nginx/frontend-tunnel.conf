server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the .NET host (same origin → no CORS).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Reverse-proxy Keycloak under /auth so the SPA, the API proxy, and the IdP are all
    # on ONE origin — a single Cloudflare quick tunnel (→ :8081) covers the whole stack.
    # Keycloak runs with KC_HTTP_RELATIVE_PATH=/auth, so the /auth/ prefix is preserved.
    # X-Forwarded-Proto=https tells Keycloak (KC_PROXY_HEADERS=xforwarded) it is behind TLS.
    location /auth/ {
        proxy_pass http://keycloak:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
