# Walking-skeleton infrastructure for 1–2 Linux servers (docs/design/02 §4).
# Profiles let the data/observability tiers move to a second host later.
name: industry-trade

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-industrytrade}
      POSTGRES_USER: ${POSTGRES_USER:-itrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-itrade_dev_pw}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itrade} -d ${POSTGRES_DB:-industrytrade}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports: ["5672:5672", "15672:15672"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports: ["8090:8080"]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-industrytrade};Username=${POSTGRES_USER:-itrade};Password=${POSTGRES_PASSWORD:-itrade_dev_pw}"
      Cors__Origins: "http://localhost:8081"
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-industrytrade};Username=${POSTGRES_USER:-itrade};Password=${POSTGRES_PASSWORD:-itrade_dev_pw}"
      ConnectionStrings__RabbitMq: "amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    ports: ["8081:80"]
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
